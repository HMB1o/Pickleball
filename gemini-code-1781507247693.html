<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Bracket Hub</title>
    <style>
        :root {
            --bg-dark: #030712;
            --bg-card: #0b1528;
            --accent-blue: #3b82f6;
            --neon-blue: #00d2ff;
            --text-light: #f3f4f6;
            --text-gray: #6b7280;
            --border-blue: #1e3a8a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-blue);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--neon-blue);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2, h3 {
            color: var(--accent-blue);
            margin-top: 0;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-blue);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        /* Setup Screen Controls */
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .player-checkbox {
            background: #111827;
            border: 1px solid var(--border-blue);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
